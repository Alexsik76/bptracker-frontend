<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BP Tracker</title>
    <!-- UnoCSS JIT CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@unocss/runtime"></script>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/822/822143.png">
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('PWA Ready'))
                    .catch(err => console.log('PWA Failed', err));
            });
        }
    </script>
    
    <style>
        [un-cloak] { display: none; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-900" un-cloak>

    <header class="bg-blue-600 text-white p-4 shadow-md">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">BP Tracker</h1>
            <button id="add-btn" class="bg-white text-blue-600 px-4 py-2 rounded-lg font-semibold hover:bg-gray-100 transition">
                Додати замір
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 space-y-6">
        
        <!-- Схема лікування (якщо активна) -->
        <section id="schema-section" class="hidden bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500">
            <h2 class="text-sm font-semibold text-gray-500 uppercase">Поточна схема лікування</h2>
            <div id="schema-content" class="mt-2 text-lg font-medium"></div>
        </section>

        <!-- Графік -->
        <section class="bg-white p-4 rounded-xl shadow-sm">
            <canvas id="bp-chart"></canvas>
        </section>

        <!-- Останні записи -->
        <section class="bg-white p-4 rounded-xl shadow-sm overflow-hidden">
            <h2 class="text-xl font-bold mb-4">Історія замірів</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-gray-100 text-gray-500 text-sm">
                            <th class="py-2">Дата</th>
                            <th class="py-2">Тиск (SYS/DIA)</th>
                            <th class="py-2">Пульс</th>
                        </tr>
                    </thead>
                    <tbody id="measurements-list">
                        <!-- Сюди будуть додаватися рядки -->
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <!-- Модальне вікно для додавання -->
    <div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white p-6 rounded-2xl w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-bold mb-4">Новий замір</h2>
            <form id="bp-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Систолічний (SYS)</label>
                    <input type="number" name="sys" required min="40" max="300" 
                           class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Діастолічний (DIA)</label>
                    <input type="number" name="dia" required min="20" max="200" 
                           class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Пульс</label>
                    <input type="number" name="pulse" required min="30" max="250" 
                           class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="flex space-x-3 pt-2">
                    <button type="button" id="close-modal" class="flex-1 py-3 text-gray-600 font-semibold hover:bg-gray-100 rounded-xl transition">
                        Скасувати
                    </button>
                    <button type="submit" class="flex-1 py-3 bg-blue-600 text-white font-semibold hover:bg-blue-700 rounded-xl transition shadow-lg shadow-blue-200">
                        Зберегти
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Нотифікації -->
    <div id="toast" class="fixed bottom-6 right-6 translate-y-20 opacity-0 transition duration-300 pointer-events-none bg-gray-900 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center space-x-3">
        <span id="toast-message"></span>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
